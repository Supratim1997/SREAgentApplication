apiVersion: v1
kind: Namespace
metadata:
  name: sre-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: step-ca
  namespace: sre-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: step-ca
  template:
    metadata:
      labels:
        app: step-ca
    spec:
      containers:
      - name: step-ca
        image: smallstep/step-ca:latest
        ports:
        - containerPort: 9000
        env:
        - name: DOCKER_STEPCA_INIT_NAME
          value: "SRE-Hackathon-CA"
        - name: DOCKER_STEPCA_INIT_DNS_NAMES
          value: "step-ca.sre-system.svc.cluster.local,localhost"
        - name: DOCKER_STEPCA_INIT_PASSWORD
          value: "password123"
---
apiVersion: v1
kind: Service
metadata:
  name: step-ca
  namespace: sre-system
spec:
  selector:
    app: step-ca
  ports:
    - protocol: TCP
      port: 9000
      targetPort: 9000